<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵感探索 · Inspiration Explorer</title>

  <!-- Google Fonts: Inter (英文) + Noto Sans SC (中文) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- 样式 -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Three.js (ES Module from CDN) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="header">
    <div class="header-logo">
      <span class="logo-icon">🌐</span>
      <span class="logo-text">灵感探索</span>
      <span class="logo-sub">Inspiration Explorer</span>
    </div>
    <nav class="header-nav">
      <button class="header-back" onclick="window.location.href='../content-hub-demo.html'" title="返回内容力专区">
        ← 返回 Content Hub
      </button>
    </nav>
  </header>

  <!-- ===== 三栏布局 ===== -->
  <div class="app-layout">

    <!-- 左侧：时间轴 -->
    <aside class="timeline-panel" id="timelinePanel">
      <!-- 由 timeline.js 渲染 -->
    </aside>

    <!-- 中央：3D 地球 -->
    <div class="globe-container" id="globeContainer">
      <!-- Loading Overlay -->
      <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在加载 3D 地球…</div>
      </div>

      <!-- 底部状态栏 -->
      <div class="globe-status">
        <span class="status-dot"></span>
        <span>拖拽旋转 · 滚轮缩放 · 点击标注查看详情</span>
      </div>
    </div>

    <!-- 右侧：信息面板 -->
    <aside class="info-panel" id="infoPanel">
      <!-- 由 panel.js 渲染 -->
    </aside>

  </div>

  <!-- 主脚本 -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
